<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=240, height=320, user-scalable=no, initial-scale=1.0">
    <title>Lil Snips</title>
    <style>/* Lil Snips — 240×282 portrait */
:root {
  --bg:#000;--fg:#fff;--accent:#FE5F00;--card:#1a1a1a;--card-border:#333;--text-scale:1;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:calc(3.6vw*var(--text-scale));overflow:hidden;-webkit-user-select:none;user-select:none}
#app{width:100vw;height:100vh;position:relative}

/* Screen */
.screen{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:1vw 3vw;height:10vh;min-height:28px;background:var(--card);border-bottom:1px solid var(--card-border);flex-shrink:0}
.header-title{font-size:calc(4vw*var(--text-scale));font-weight:700;color:var(--accent);flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{min-width:28px;min-height:28px;width:10vw;height:10vw;max-width:32px;max-height:32px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--fg);font-size:calc(4vw*var(--text-scale));cursor:pointer;border-radius:50%;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.icon-btn:active{background:rgba(255,255,255,.1)}

/* Scroll area */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:1vw 0;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{width:2px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--accent);border-radius:1px}

/* List items */
.list-item{display:flex;align-items:center;padding:2vw 4vw;min-height:32px;border-bottom:1px solid var(--card-border);cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.list-item:active{background:var(--card)}
.item-icon{font-size:calc(3.5vw*var(--text-scale));margin-right:2.5vw;flex-shrink:0}
.item-text{flex:1;font-size:calc(3.2vw*var(--text-scale));line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
.item-num{font-size:calc(2.5vw*var(--text-scale));color:var(--accent);opacity:.6;margin-right:1.5vw;font-weight:600;flex-shrink:0;font-variant-numeric:tabular-nums}
.item-count{font-size:calc(2.8vw*var(--text-scale));color:var(--accent);background:rgba(255,255,255,.08);padding:.3vw 1.8vw;border-radius:3vw;margin-left:2vw;flex-shrink:0}
.folder-item .item-icon{font-size:calc(4vw*var(--text-scale))}
.snip-item .item-icon{opacity:.6}
.img-item .item-icon{opacity:.8}

/* Checkboxes */
.snip-cb{display:flex;align-items:center;justify-content:center;margin-right:2vw;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.snip-cb input{display:none}
.cb-mark{width:16px;height:16px;border:2px solid var(--accent);border-radius:3px;display:flex;align-items:center;justify-content:center;background:transparent;transition:background .15s,border-color .15s}
.snip-cb input:checked+.cb-mark{background:var(--accent);border-color:var(--accent)}
.snip-cb input:checked+.cb-mark::after{content:'✓';color:#000;font-size:10px;font-weight:700;line-height:1}
.checked-text{text-decoration:line-through;opacity:.5}

/* Empty state */
.empty-msg{text-align:center;color:rgba(255,255,255,.35);font-size:calc(3vw*var(--text-scale));padding:10vh 5vw 0;line-height:1.6}

/* Toolbar */
.toolbar{display:flex;gap:2vw;padding:1.5vw 3vw;background:var(--card);border-top:1px solid var(--card-border);flex-shrink:0}
.tool-btn{flex:1;min-height:28px;background:rgba(255,255,255,.08);border:1px solid var(--card-border);color:var(--fg);font-size:calc(3vw*var(--text-scale));font-family:inherit;border-radius:4px;cursor:pointer;white-space:nowrap}
.tool-btn:active{background:rgba(255,255,255,.18)}

/* Status / Recording */
.rec-pill,.status-pill{position:absolute;bottom:12vh;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);color:var(--accent);font-size:calc(2.8vw*var(--text-scale));padding:.8vw 3vw;border-radius:20px;white-space:nowrap;z-index:10}

/* Master prompt */
.master-prompt{background:rgba(255,255,255,.04);border-bottom:1px solid var(--card-border);padding:1.5vw 4vw;font-size:calc(2.5vw*var(--text-scale));color:rgba(255,255,255,.5);cursor:pointer;flex-shrink:0}
.master-prompt:active{background:rgba(255,255,255,.08)}
.mp-label{color:var(--accent);margin-right:1vw}
.add-mp .mp-label{color:rgba(255,255,255,.3)}

/* Agent bar */
.agent-bar{display:flex;align-items:center;gap:2vw;padding:1.5vw 4vw;background:var(--card);border-top:1px solid var(--card-border);font-size:calc(2.5vw*var(--text-scale));flex-shrink:0;cursor:pointer}
.agent-lbl{color:var(--accent);flex-shrink:0}
.agent-txt{flex:1;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-save{color:var(--accent);flex-shrink:0}

/* Settings */
.section-lbl{padding:2vw 4vw 1vw;font-size:calc(2.5vw*var(--text-scale));color:var(--accent);font-weight:600}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:2.5vw 4vw;border-bottom:1px solid var(--card-border);font-size:calc(3vw*var(--text-scale))}
.setting-lbl{flex:1}
.setting-btn{background:rgba(255,255,255,.08);border:1px solid var(--card-border);color:var(--fg);font-size:calc(2.8vw*var(--text-scale));font-family:inherit;padding:1vw 2vw;border-radius:4px;cursor:pointer}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:rgba(255,255,255,.2);border-radius:20px;transition:.2s;cursor:pointer}
.slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--accent)}
.toggle input:checked+.slider:before{transform:translateX(16px)}
.scale-ctrl{display:flex;align-items:center;gap:2vw}
.scale-btn{background:rgba(255,255,255,.1);border:1px solid var(--card-border);color:var(--fg);width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:calc(3vw);cursor:pointer}
.scale-val{min-width:8vw;text-align:center;font-size:calc(2.8vw*var(--text-scale))}
.danger-btn{background:rgba(220,50,50,.15);border-color:rgba(220,50,50,.4);color:#e63946}

/* Theme swatch */
.theme-sw{width:16px;height:16px;border-radius:50%;margin-right:3vw;flex-shrink:0}
.check{color:var(--accent);margin-left:auto}

/* Edit modal */
.edit-area{flex:1;display:flex;flex-direction:column;padding:2vw}
.edit-ta{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--card-border);color:var(--fg);font-family:inherit;font-size:calc(3.2vw*var(--text-scale));padding:2vw;border-radius:4px;resize:none;line-height:1.5}
.edit-ta:focus{outline:none;border-color:var(--accent)}
.del-btn{background:rgba(220,50,50,.15);border:1px solid rgba(220,50,50,.4);color:#e63946;font-family:inherit;font-size:calc(3vw*var(--text-scale));padding:2vw;border-radius:4px;cursor:pointer;margin:2vw 4vw}

/* Camera screen */
.camera-screen{width:100vw;height:100vh;display:flex;flex-direction:column;background:#000}
.camera-feed{flex:1;width:100%;min-height:0;background:#111;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center}
.camera-waiting{color:rgba(255,255,255,.4);font-size:calc(3.5vw);text-align:center}
.camera-hud{flex-shrink:0;background:rgba(0,0,0,.7);padding:2vw 3vw;height:42px;display:flex;align-items:center;justify-content:center}
.camera-hint{font-size:calc(2.4vw);color:rgba(255,255,255,.6);text-align:center}

/* Image overlay */
.img-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.img-preview{max-width:94vw;max-height:88vh;border-radius:4px}
.img-close{color:rgba(255,255,255,.6);font-size:calc(3.5vw);margin-top:3vh;padding:2vw 4vw;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
